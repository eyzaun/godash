# GolangCI-Lint Configuration for GoDash
run:
  timeout: 5m
  issues-exit-code: 1
  tests: true

# Output configuration
output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true

# Enable specific linters
linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - goconst
    - gocyclo
    - unparam
    - nakedret
    - prealloc

# Configure linters
linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
  
  revive:
    min-confidence: 0.8
  
  gocyclo:
    min-complexity: 15
  
  goconst:
    min-len: 3
    min-occurrences: 3
  
  misspell:
    locale: US
  
  unparam:
    check-exported: false
  
  nakedret:
    max-func-lines: 30
  
  prealloc:
    simple: true
    range-loops: true
    for-loops: false

# Issues configuration
issues:
  exclude-use-default: false
  exclude-dirs:
    - vendor
    - node_modules
  exclude-files:
    - ".*\\.pb\\.go$"
    - ".*\\.gen\\.go$"
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - errcheck
        - gosec
        - gocyclo
        - dupl
    - path: "cmd/cli/main\\.go"
      linters:
        - gocyclo  # CLI main function can be complex
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false

severity:
  default-severity: error