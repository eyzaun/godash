# GolangCI-Lint Configuration
run:
  timeout: 5m
  tests: true

# Output configuration
output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true

# Enable specific linters
linters:
  enable:
    - gofmt
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - goconst
    - gocyclo
    - misspell
    - unparam
    - dogsled
    - nakedret
    - prealloc
    - copyloopvar
    - gocritic
  disable:
    - exportloopref

# Configure linters
linters-settings:
  gocyclo:
    min-complexity: 15
  goconst:
    min-len: 3
    min-occurrences: 3
  misspell:
    locale: US
  unparam:
    check-exported: false
  nakedret:
    max-func-lines: 30
  prealloc:
    simple: true
    range-loops: true
    for-loops: false
  gocritic:
    enabled-tags:
      - performance
      - style
      - experimental
    disabled-checks:
      - wrapperFunc
      - dupImport

# Issues configuration (consolidated)
issues:
  exclude-use-default: false
  exclude-dirs:
    - vendor
    - node_modules
  exclude-files:
    - ".*\\.pb\\.go$"
    - ".*\\.gen\\.go$"
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - gocyclo
        - errcheck
        - dupl
        - gosec
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
  uniq-by-line: true
