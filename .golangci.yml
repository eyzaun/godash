# GolangCI-Lint Configuration
run:
  timeout: 5m
  tests: true

# Enable specific linters
linters:
  enable:
    - gofmt
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - goconst
    - gocyclo
    - misspell
    - unparam
    - dogsled
    - nakedret
    - prealloc
    - copyloopvar  # Replaced exportloopref
    - gocritic
  disable:
    - exportloopref  # Deprecated since Go 1.22

# Configure linters
linters-settings:
  gocyclo:
    min-complexity: 15
  goconst:
    min-len: 3
    min-occurrences: 3
  misspell:
    locale: US
  unparam:
    check-exported: false
  nakedret:
    max-func-lines: 30
  prealloc:
    simple: true
    range-loops: true
    for-loops: false
  gocritic:
    enabled-tags:
      - performance
      - style
      - experimental
    disabled-checks:
      - wrapperFunc
      - dupImport

# Issues configuration
issues:
  exclude-use-default: false
  exclude-dirs:
    - vendor
    - node_modules
  exclude-files:
    - ".*\\.pb\\.go$"
    - ".*\\.gen\\.go$"
  exclude-rules:
    # Disable linters that are annoying in tests.
    - path: "_test\\.go"
      linters:
        - gocyclo
        - errcheck
        - dupl
        - gosec

  # Maximum issues count per one linter. Set to 0 to disable. Default is 50.
  max-issues-per-linter: 0

  # Maximum count of issues with the same text. Set to 0 to disable. Default is 3.
  max-same-issues: 0

  # Show only new issues: if there are unstaged changes or untracked files,
  # only those changes are analyzed, else only changes in HEAD~ are analyzed.
  new: false

# Output configuration options
output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true

# Issues configuration
issues:
  uniq-by-line: true
